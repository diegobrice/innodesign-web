<!doctype html>
<html><head><meta charset="utf-8"><title>Card — Panel</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px;}
  .row { display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .panel { position:relative; background:var(--id-bg-1); border:1px solid var(--id-border); border-radius:4px; padding:16px; min-height:150px;}
  .panel.accent { border-color: color-mix(in oklch, #3BC2F2 55%, transparent); box-shadow: 0 0 0 1px color-mix(in oklch, #3BC2F2 55%, transparent), 0 0 24px -6px #3BC2F2;}
  .eyebrow { font-family:var(--id-font-mono); font-size:10px; letter-spacing:.14em; color:var(--id-fg-2); text-transform:uppercase; margin-bottom:12px;}
  .accent .eyebrow { color:var(--id-accent);}
  h3 { margin:0 0 6px 0; color:var(--id-fg-0); font-family:var(--id-font-sans); font-weight:500; font-size:20px; letter-spacing:-0.01em;}
  p { margin:0; color:var(--id-fg-1); font-size:14px;}
  .corner { position:absolute; width:10px; height:10px; border:1.5px solid var(--id-accent);}
  .c1 { top:-1px; left:-1px; border-right:0; border-bottom:0;}
  .c2 { top:-1px; right:-1px; border-left:0; border-bottom:0;}
  .c3 { bottom:-1px; left:-1px; border-right:0; border-top:0;}
  .c4 { bottom:-1px; right:-1px; border-left:0; border-top:0;}
</style></head>
<body>
  <div class="row">
    <div class="panel">
      <div class="eyebrow">01. resting</div>
      <h3>Código limpio.</h3>
      <p>Sistemas escalables. Velocidad con calidad.</p>
    </div>
    <div class="panel accent">
      <span class="corner c1"></span><span class="corner c2"></span><span class="corner c3"></span><span class="corner c4"></span>
      <div class="eyebrow">02. featured</div>
      <h3>Build fast. Break less.</h3>
      <p>Cyan border + glow, bracket corners. Use once per view.</p>
    </div>
  </div>
</body></html>
