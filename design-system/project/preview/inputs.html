<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; }
  .stack { display:flex; flex-direction:column; gap:10px; max-width:420px;}
  label { font-family:var(--id-font-mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--id-fg-2);}
  .field { position:relative; background:var(--id-bg-1); border:1px solid var(--id-border); border-radius:2px; display:flex; align-items:center; padding:10px 12px; gap:8px;}
  .field.focus { border-color:var(--id-accent); box-shadow: 0 0 0 2px rgba(59,194,242,.18);}
  .field.error { border-color:#FF5C6C;}
  .field .prefix { font-family:var(--id-font-mono); color:var(--id-accent); font-size:13px;}
  input { flex:1; background:transparent; border:0; outline:0; color:var(--id-fg-0); font-family:var(--id-font-mono); font-size:13px;}
  .caret { color:var(--id-accent); animation: id-blink 1.1s steps(2) infinite;}
  .err { color:#FF5C6C; font-family:var(--id-font-mono); font-size:11px;}
</style></head>
<body>
  <div class="stack">
    <label>email</label>
    <div class="field focus"><span class="prefix">&gt;</span><input value="hola@innodesign.dev"/><span class="caret">_</span></div>
    <label>nombre</label>
    <div class="field"><span class="prefix">&gt;</span><input placeholder="tu nombre"/></div>
    <label>proyecto</label>
    <div class="field error"><span class="prefix">&gt;</span><input value="" placeholder="requerido"/></div>
    <div class="err">✗ this field is required</div>
  </div>
</body></html>
