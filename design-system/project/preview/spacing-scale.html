<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; }
  .row { display:flex; align-items:center; gap:14px; padding:6px 0; }
  .tag { font-family:var(--id-font-mono); font-size:10px; color:var(--id-fg-2); letter-spacing:.1em; width:110px; }
  .bar { height:14px; background:var(--id-accent); border-radius:2px; }
  .px { font-family:var(--id-font-mono); font-size:10px; color:var(--id-fg-1); }
</style></head>
<body>
  <div class="row"><span class="tag">--id-space-1</span><span class="bar" style="width:4px"></span><span class="px">4px</span></div>
  <div class="row"><span class="tag">--id-space-2</span><span class="bar" style="width:8px"></span><span class="px">8px</span></div>
  <div class="row"><span class="tag">--id-space-3</span><span class="bar" style="width:12px"></span><span class="px">12px</span></div>
  <div class="row"><span class="tag">--id-space-4</span><span class="bar" style="width:16px"></span><span class="px">16px</span></div>
  <div class="row"><span class="tag">--id-space-5</span><span class="bar" style="width:24px"></span><span class="px">24px</span></div>
  <div class="row"><span class="tag">--id-space-6</span><span class="bar" style="width:32px"></span><span class="px">32px</span></div>
  <div class="row"><span class="tag">--id-space-7</span><span class="bar" style="width:48px"></span><span class="px">48px</span></div>
  <div class="row"><span class="tag">--id-space-8</span><span class="bar" style="width:64px"></span><span class="px">64px</span></div>
</body></html>
