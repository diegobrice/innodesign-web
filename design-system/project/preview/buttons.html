<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:26px; }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap;}
  .btn { font-family:var(--id-font-mono); font-size:13px; letter-spacing:.06em; text-transform:uppercase; padding:10px 16px; border-radius:2px; cursor:pointer; border:1px solid transparent; transition: all 160ms cubic-bezier(0.2, 0.7, 0.2, 1);}
  .primary { background:var(--id-accent); color:#0B0F14; border-color:var(--id-accent); font-weight:700;}
  .primary::before { content:"> "; }
  .ghost { background:transparent; color:var(--id-fg-0); border-color:var(--id-border-strong);}
  .ghost.hover { background:var(--id-bg-2); border-color:var(--id-accent);}
  .outline { background:transparent; color:var(--id-accent); border-color:var(--id-accent);}
  .disabled { background:var(--id-bg-2); color:var(--id-fg-3); border-color:var(--id-border); cursor:not-allowed;}
  .caption { font-family:var(--id-font-mono); font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--id-fg-2); margin-top:14px;}
</style></head>
<body>
  <div class="row">
    <button class="btn primary">Ver proyectos</button>
    <button class="btn ghost">Contactar</button>
    <button class="btn ghost hover">hovered</button>
    <button class="btn outline">→ Download</button>
    <button class="btn disabled">Disabled</button>
  </div>
  <div class="caption">primary · ghost · ghost(hover) · outline · disabled</div>
</body></html>
