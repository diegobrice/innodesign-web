<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; }
  .row { display:grid; grid-template-columns: 90px 1fr; gap:12px; align-items:baseline; padding:8px 0; border-bottom:1px dashed var(--id-border); }
  .row:last-child { border-bottom:0; }
  .tag { font-family:var(--id-font-mono); font-size:10px; color:var(--id-fg-2); letter-spacing:.1em; text-transform:uppercase; }
  .spec { color:var(--id-fg-0); letter-spacing:-0.02em; }
</style></head>
<body>
  <div class="row"><span class="tag">H1 · 52</span><span class="spec" style="font-size:52px; font-weight:700; line-height:1.05;">Construimos software</span></div>
  <div class="row"><span class="tag">H2 · 36</span><span class="spec" style="font-size:36px; font-weight:700; line-height:1.15;">Sistemas escalables</span></div>
  <div class="row"><span class="tag">H3 · 24</span><span class="spec" style="font-size:24px; font-weight:500;">Código limpio</span></div>
  <div class="row"><span class="tag">Body · 16</span><span class="spec" style="font-size:16px; font-weight:400; color:var(--id-fg-1);">Velocidad con calidad — shippeamos productos, no promesas.</span></div>
  <div class="row"><span class="tag">Small · 14</span><span class="spec" style="font-size:14px; color:var(--id-fg-2);">Secondary / supporting text</span></div>
</body></html>
