<!doctype html>
<html><head><meta charset="utf-8"><title>Gradient Rule</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px;}
  .eyebrow { font-family:var(--id-font-mono); font-size:10px; letter-spacing:.14em; color:var(--id-fg-2); text-transform:uppercase; margin-bottom:6px;}
  h2 { margin:0; color:var(--id-fg-0); font-family:var(--id-font-sans); font-weight:700; font-size:32px; letter-spacing:-0.02em;}
  .rule { height:2px; width:100%; background: linear-gradient(90deg, #3BC2F2 0%, #2563EB 60%, #7C3AED 100%); margin-top:18px;}
  .caption { margin-top:10px; font-family:var(--id-font-mono); font-size:10px; letter-spacing:.14em; color:var(--id-fg-2); text-transform:uppercase;}
</style></head>
<body>
  <div class="eyebrow">04. Paleta de colores</div>
  <h2>Usar acentos con moderación.</h2>
  <div class="rule"></div>
  <div class="caption">Only place gradient appears · 2px decorative rule</div>
</body></html>
