<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; }
  .eyebrow { font-family:var(--id-font-mono); font-size:10px; letter-spacing:.14em; color:var(--id-fg-2); text-transform:uppercase; margin-bottom:14px;}
  .word { font-family:var(--id-font-sans); font-weight:700; font-size:84px; line-height:1; letter-spacing:-0.03em; color:var(--id-fg-0);}
  .word span { color:var(--id-accent); }
  .meta { margin-top:14px; display:flex; gap:18px; font-family:var(--id-font-mono); font-size:11px; color:var(--id-fg-2);}
  .meta b { color:var(--id-fg-0); font-weight:500; }
</style></head>
<body>
  <div class="eyebrow">Inter · Display · 84/1.0</div>
  <div class="word">Build fast.<br/><span>Break less.</span></div>
  <div class="meta"><span><b>Family</b> Inter</span><span><b>Weight</b> 700 Bold</span><span><b>Tracking</b> -0.03em</span></div>
</body></html>
