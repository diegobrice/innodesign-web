<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px;}
  h4 { font-family:var(--id-font-mono); font-size:10px; letter-spacing:.14em; color:var(--id-fg-2); text-transform:uppercase; margin:0 0 10px 0;}
  .row { display:flex; gap:18px; align-items:center; margin-bottom:14px;}
  .glyph { font-family:var(--id-font-mono); font-size:22px; color:var(--id-fg-0);}
  .accent { color:var(--id-accent);}
  .ok { color:#22D38E;}
  .err { color:#FF5C6C;}
  .lucide { display:flex; gap:14px; align-items:center;}
  .lucide svg { color:var(--id-fg-0); stroke-width:1.5;}
  .note { font-family:var(--id-font-mono); font-size:10px; color:var(--id-fg-2); margin-left:auto;}
</style></head>
<body>
  <h4>Typographic glyphs · primary "icons"</h4>
  <div class="row">
    <span class="glyph accent">&gt;</span>
    <span class="glyph accent">_</span>
    <span class="glyph">//</span>
    <span class="glyph ok">✓</span>
    <span class="glyph err">✗</span>
    <span class="glyph">{ }</span>
    <span class="glyph">●</span>
  </div>
  <h4>Lucide · 20px · 1.5 stroke · substitution</h4>
  <div class="lucide">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>
    <span class="note">⚠ sub — confirm w/ team</span>
  </div>
</body></html>
