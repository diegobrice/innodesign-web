<!doctype html>
<html><head><meta charset="utf-8"><title>HUD / Data</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px;}
  .hud { background:var(--id-bg-1); border:1px solid var(--id-border); border-radius:4px; padding:14px; font-family:var(--id-font-mono); font-size:12px;}
  .row { display:flex; justify-content:space-between; gap:14px; padding:5px 0; border-bottom:1px dashed var(--id-border);}
  .row:last-child { border-bottom:0;}
  .k { color:var(--id-accent); letter-spacing:.08em;}
  .v { color:var(--id-fg-0);}
  .bar { display:inline-block; width:90px; height:6px; background:var(--id-bg-2); vertical-align:middle; margin-right:8px; border-radius:2px; overflow:hidden;}
  .fill { display:block; height:100%; background:var(--id-accent);}
</style></head>
<body>
  <div class="hud">
    <div class="row"><span class="k">CPU</span><span class="v"><span class="bar"><span class="fill" style="width:23%"></span></span>23%</span></div>
    <div class="row"><span class="k">MEM</span><span class="v"><span class="bar"><span class="fill" style="width:56%"></span></span>56%</span></div>
    <div class="row"><span class="k">NET</span><span class="v">18.2 MB/s ↑</span></div>
    <div class="row"><span class="k">UPTIME</span><span class="v">7d 14h 32m</span></div>
    <div class="row"><span class="k">STATUS</span><span class="v" style="color:#22D38E">● online</span></div>
  </div>
</body></html>
