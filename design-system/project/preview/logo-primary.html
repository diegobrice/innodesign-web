<!doctype html>
<html><head><meta charset="utf-8"><title>Logo — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:30px; background:var(--id-bg-0);}
  .frame { position:relative; border:1px solid var(--id-border); border-radius:4px; padding:34px 28px; display:flex; align-items:center; justify-content:center;}
  .frame::before, .frame::after, .frame > .c1, .frame > .c2 { content:""; position:absolute; width:18px; height:18px; border:2px solid var(--id-accent);}
  .frame::before { top:-1px; left:-1px; border-right:0; border-bottom:0;}
  .frame::after { top:-1px; right:-1px; border-left:0; border-bottom:0;}
  .frame .c1 { bottom:-1px; left:-1px; border-right:0; border-top:0;}
  .frame .c2 { bottom:-1px; right:-1px; border-left:0; border-top:0;}
  img { height:56px; display:block; }
</style></head>
<body>
  <div class="frame"><span class="c1"></span><span class="c2"></span>
    <img src="../assets/logo-wordmark.svg" alt="innodesign">
  </div>
</body></html>
